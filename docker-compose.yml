services: 
  web:
    build: .
    command: bundle exec middleman server --bind-address=0.0.0.0 --watcher-force-polling --watcher-latency=1
    
    volumes:
      - '.:/app'
      - 'node_modules:/app/node_modules'
    ports:
      - '4567:4567'
      - '35729:35729'
    
    environment:
      - MIDDLEMAN_ENV=development

volumes: 
  node_modules:
